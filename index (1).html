<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Website</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Minecraft', sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    color:white;
}

/* Background */
.background{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* Main */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* Logo */
.logo{
    width:90%;
    max-width:950px;
    animation:float 3s ease-in-out infinite;
    filter:drop-shadow(0 0 25px black);
}

/* Title */
.title{
    margin-top:25px;
    font-size:42px;
    letter-spacing:4px;
    text-shadow:
        4px 4px 0px black,
        0 0 15px black;
}

/* Input */
.inputBox{
    margin-top:40px;
    width:90%;
    max-width:900px;
}

textarea{
    width:100%;
    height:120px;
    border:none;
    outline:none;
    resize:none;
    border-radius:14px;
    padding:18px;
    font-size:13px;
    background:rgba(0,0,0,0.75);
    color:white;
    box-shadow:0 0 20px black;
}

/* Button */
button{
    margin-top:20px;
    padding:14px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:20px;
    background:#32cd32;
    color:white;
    transition:0.2s;
    box-shadow:0 0 20px black;
}

button:hover{
    transform:scale(1.05);
}

/* Popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* Popup Box */
.popupBox{
    width:95%;
    height:92%;
    background:#111;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 30px black;
    display:flex;
    flex-direction:column;
}

/* Top Bar */
.topbar{
    height:60px;
    background:#1b1b1b;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    border-bottom:2px solid #333;
}

/* Small Logo */
.smallLogo{
    height:40px;
}

/* Close */
.closeBtn{
    width:45px;
    height:45px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:24px;
    cursor:pointer;
}

/* Runner */
.runner{
    flex:1;
    border:none;
    background:white;
}

/* Animation */
@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

@media(max-width:768px){

    .title{
        font-size:24px;
    }

    button{
        font-size:16px;
    }

}

</style>
</head>

<body>

<!-- Background -->
<img 
src="https://uploads.onecompiler.io/44cr57842/44qaku6qx/461.jpg"
class="background"
>

<div class="overlay"></div>

<div class="container">

    <!-- Logo -->
    <img 
    src="https://uploads.onecompiler.io/44cr57842/44qaku6qx/451.png"
    class="logo"
    >

    <!-- Title -->
    <div class="title">
        OFFICIAL WEBSITE
    </div>

    <!-- Input -->
    <div class="inputBox">

        <textarea 
        id="base64Input"
        placeholder="PASTE BASE64 HTML HERE..."
        ></textarea>

        <br>

        <button onclick="runBase64()">
            RUN
        </button>

    </div>

</div>

<!-- Popup -->
<div class="popup" id="popup">

    <div class="popupBox">

        <!-- Top Bar -->
        <div class="topbar">

            <img 
            src="https://uploads.onecompiler.io/44cr57842/44qaku6qx/451.png"
            class="smallLogo"
            >

            <button class="closeBtn" onclick="closePopup()">
                X
            </button>

        </div>

        <!-- Runner -->
        <iframe id="runner" class="runner"></iframe>

    </div>

</div>

<script>

function runBase64(){

    const input = document
        .getElementById("base64Input")
        .value
        .trim();

    const popup = document
        .getElementById("popup");

    const runner = document
        .getElementById("runner");

    try{

        let clean = input;

        // Remove prefix
        if(clean.startsWith("data:text/html;base64,")){

            clean = clean.split(",")[1];

        }

        // Decode
        const decoded = atob(clean);

        console.log(decoded);

        // Validation
        const valid =
            decoded.toLowerCase().includes("mcse") &&
            decoded.toLowerCase().includes("code.2256");

        if(valid){

            // Show popup
            popup.style.display = "flex";

            // Run HTML
            runner.srcdoc = decoded;

        }else{

            alert("INVALID");

        }

    }catch(error){

        alert("INVALID BASE64");

    }

}

function closePopup(){

    document.getElementById("popup").style.display = "none";

    document.getElementById("runner").srcdoc = "";

}

</script>

</body>
</html>
